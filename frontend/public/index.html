<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="GovLens - Public Services Analytics Platform" />
    <meta name="theme-color" content="#0a0f1e" />
    <title>GovLens — Public Services Analytics</title>
    <style>
      /* System font stack that works offline in Docker */
      :root {
        --font-display: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
        --font-mono: 'Cascadia Code', 'Fira Code', 'Consolas', 'Menlo', monospace;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { 
        background: #0a0f1e; 
        font-family: var(--font-display);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root { min-height: 100vh; }
      /* Initial loading state */
      #root:empty::after {
        content: '';
        display: block;
        width: 32px; height: 32px;
        border: 2px solid rgba(14,165,233,0.2);
        border-top-color: #0ea5e9;
        border-radius: 50%;
        margin: 48vh auto 0;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
