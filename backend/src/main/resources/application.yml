spring:
  application:
    name: govlens

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/govlens}
    username: ${DB_USERNAME:govlens}
    password: ${DB_PASSWORD:govlens}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,text/html,text/css,application/javascript

govlens:
  jwt:
    # FIX: Secret must be >= 64 chars for HS512. Default is now long enough.
    secret: ${JWT_SECRET:govlens-production-secret-key-must-be-at-least-64-characters-long-for-hs512}
    access-expiration-ms: 900000
    refresh-expiration-ms: 604800000
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: gpt-4
    max-tokens: 300

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.govlens: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
